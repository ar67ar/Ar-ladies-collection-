<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSHARA | Luxury Abayas & Bags</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent-gold: #e5c158;
            --light-gold: #f4e3b1;
            --text-color: #f5f5f5;
            --text-muted: #a0a0a0;
        }

        body { 
            font-family: 'Cinzel', 'Didot', 'Segoe UI', serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0;
        }

        /* Premium Navbar */
        .navbar { 
            background: linear-gradient(180deg, #000000 0%, #0d0d0d 100%);
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(229, 193, 88, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        
        .logo-container img {
            max-height: 50px;
            object-fit: contain;
        }
        
        .logo-text { 
            font-size: 32px; 
            font-weight: 700; 
            color: var(--accent-gold); 
            letter-spacing: 6px;
            text-shadow: 0px 2px 10px rgba(229, 193, 88, 0.2);
            text-decoration: none;
        }

        .nav-btn { 
            background: transparent; 
            color: var(--accent-gold); 
            border: 1px solid var(--accent-gold); 
            padding: 10px 24px; 
            cursor: pointer; 
            font-weight: 600; 
            border-radius: 0px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 15px var(--accent-gold);
        }

        /* Luxury Hero Banner */
        .hero { 
            height: 450px; 
            background: linear-gradient(rgba(0,0,0,0.75), rgba(13,13,13,1)), url('https://images.unsplash.com/photo-1537835063645-82dd246ef14f?q=80&w=1400') no-repeat center center/cover; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            border-bottom: 1px solid rgba(229, 193, 88, 0.1);
            transition: background 0.3s ease;
        }
        
        .hero h1 { 
            color: var(--light-gold); 
            font-size: 60px; 
            margin: 0; 
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 300;
        }
        
        .hero p {
            color: var(--text-muted);
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Main Container */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Admin Dashboard Grid Style */
        .admin-panel { 
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: 0px; 
            border: 1px solid var(--accent-gold); 
            display: none; 
            margin-bottom: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .admin-panel h2 { color: var(--accent-gold); margin-top: 0; letter-spacing: 2px; }
        
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }

        input, select { 
            background: #1f1f1f; 
            color: white; 
            border: 1px solid #333; 
            padding: 12px; 
            width: 100%; 
            border-radius: 0px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        
        input:focus, select:focus { border-color: var(--accent-gold); outline: none; }
        
        .admin-section { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; }

        /* Products Display */
        .section-title {
            text-align: center;
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--light-gold);
            margin-bottom: 40px;
        }

        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 35px; 
        }
        
        .product-card { 
            background: var(--card-bg); 
            border-radius: 0px; 
            overflow: hidden; 
            border: 1px solid #222; 
            padding-bottom: 25px; 
            text-align: center; 
            transition: transform 0.4s ease, border-color 0.4s ease;
        }
        
        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
        }
        
        .product-card img { width: 100%; height: 350px; object-fit: cover; }
        
        .product-card h3 { 
            color: #fff; 
            margin: 20px 0 5px; 
            font-weight: 400; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        
        .product-price { color: var(--accent-gold); font-size: 18px; margin-bottom: 15px; font-weight: 600; }
        
        .btn-order { 
            background: var(--accent-gold); 
            color: #000; 
            padding: 12px 30px; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-block; 
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .btn-order:hover {
            background: #fff;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }
        
        .btn-delete { 
            background: #cd1c1c; 
            color: white; 
            border: none; 
            padding: 7px 18px; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo-container" id="logoPlace">
            <a href="#" class="logo-text" id="logoText">LUSHARA</a>
        </div>
        <button class="nav-btn" onclick="loginAdmin()">Admin Portal</button>
    </div>

    <!-- Hero Cover Banner -->
    <div class="hero" id="heroBanner">
        <h1 id="bannerTitle">LUSHARA</h1>
        <p id="bannerSub">Luxury Abayas & Handbags</p>
    </div>

    <!-- Main Section -->
    <div class="container">
        
        <!-- Admin Dashboard Panel -->
        <div class="admin-panel" id="adminPanel">
            <h2>LUSHARA Command Center</h2>
            
            <div class="admin-grid">
                <!-- Left: Add New Items -->
                <div style="border-right: 1px solid #333; padding-right: 20px;">
                    <h3>Add New Item</h3>
                    <input type="text" id="pTitle" placeholder="Product Name (e.g., Royal Black Abaya)"><br><br>
                    <select id="pCat"><option>Abaya</option><option>Luxury Bag</option></select><br><br>
                    <input type="number" id="pPrice" placeholder="Price (PKR)"><br><br>
                    <label style="color:var(--accent-gold); font-size:12px;">Product Image:</label>
                    <input type="file" id="pImage" accept="image/*"><br><br>
                    <button class="nav-btn" style="width:100%;" onclick="addProd()">Upload to Store</button>
                </div>

                <!-- Right: Customise Brand Logo & Cover Banner -->
                <div style="padding-left: 20px;">
                    <h3>Customise Store Visuals</h3>
                    <div class="admin-section">
                        <label style="color:var(--accent-gold); font-size:12px;">Upload Custom Brand Logo (Image):</label><br><br>
                        <input type="file" id="customLogo" accept="image/*" onchange="updateLogo()"><br>
                    </div>
                    <div>
                        <label style="color:var(--accent-gold); font-size:12px;">Upload Premium Cover Banner:</label><br><br>
                        <input type="file" id="customBanner" accept="image/*" onchange="updateBanner()"><br>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">Curated Collection</div>
        <div class="products-grid" id="grid"></div>
    </div>

    <script>
        // --- WHATSAPP SETUP ---
        // Is number ko hata kar apna real number 92 format me likh dein:
        const WHATSAPP = "923186992759"; 
        
        const ADMIN_PASS = "Lushara@2026";
        let loggedIn = false;
        
        let products = JSON.parse(localStorage.getItem('lushara_prods')) || [];
        let savedLogo = localStorage.getItem('lushara_logo') || null;
        let savedBanner = localStorage.getItem('lushara_banner') || null;

        function applyVisuals() {
            if(savedLogo) {
                document.getElementById('logoPlace').innerHTML = `<img src="${savedLogo}" alt="LUSHARA">`;
            }
            if(savedBanner) {
                document.getElementById('heroBanner').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.75), rgba(13,13,13,1)), url('${savedBanner}')`;
                document.getElementById('bannerTitle').style.display = 'none';
                document.getElementById('bannerSub').style.display = 'none';
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" alt="${p.title}">
                        <h3>${p.title}</h3>
                        <div class="product-price">Rs. ${parseFloat(p.price).toLocaleString()}</div>
                        <a class="btn-order" href="https://wa.me/${WHATSAPP}?text=Salam LUSHARA, I would like to order: ${p.title} - Price: Rs. ${p.price}">Order via WhatsApp</a><br>
                        ${loggedIn ? `<button class="btn-delete" onclick="del(${p.id})">Remove Item</button>` : ''}
                    </div>
                `;
            });
        }

        function loginAdmin() {
            if(prompt("Enter LUSHARA Secure Admin Password:") === ADMIN_PASS) {
                loggedIn = true;
                document.getElementById('adminPanel').style.display = 'block';
                render();
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else { alert("Access Denied: Invalid Password."); }
        }

        function addProd() {
            const title = document.getElementById('pTitle').value;
            const price = document.getElementById('pPrice').value;
            const file = document.getElementById('pImage').files[0];
            
            if(!title || !price || !file) { alert("Please fill all item fields."); return; }

            const reader = new FileReader();
            reader.onload = (e) => {
                products.push({ id: Date.now(), title: title, price: price, img: e.target.result });
                localStorage.setItem('lushara_prods', JSON.stringify(products));
                render();
                document.getElementById('pTitle').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImage').value = '';
            };
            reader.readAsDataURL(file);
        }

        function updateLogo() {
            const file = document.getElementById('customLogo').files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('lushara_logo', e.target.result);
                    savedLogo = e.target.result;
                    applyVisuals();
                };
                reader.readAsDataURL(file);
            }
        }

        function updateBanner() {
            const file = document.getElementById('customBanner').files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('lushara_banner', e.target.result);
                    savedBanner = e.target.result;
                    applyVisuals();
                };
                reader.readAsDataURL(file);
            }
        }

        function del(id) {
            if(confirm("Are you sure you want to delete this exclusive item?")) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('lushara_prods', JSON.stringify(products));
                render();
            }
        }

        applyVisuals();
        render();
    </script>
</body>
</html>
